metadata:
  model_name: detr

parameters:
  lr: 1e-4
  lr_backbone: 1e-5
  batch_szie: 2
  weight_decay: 1e-4
  epochs: 300
  lr_drop: 200
  clip_max_norm: 0.1

  # Model_parameters:
  frozen_weights: NULL  # Path to the pretrained model. If set, only the mask head will be trained

  # Backbone:
  backbone: resnet101
  dilation: True
  position_embedding: sine

  # Transformer:
  enc_layers: 6
  dec_layers: 6
  dim_feedforward: 2048
  hidden_dim: 256
  dropout: 0.1
  nheads: 8
  num_queries: 100
  pre_norm: False

  # Segmentation:
  masks: False

  # Loss:
  aux_loss: False

  # Matcher:
  set_cost_class: 1
  set_cost_bbox: 5
  set_cost_giou: 2

  # Loss_coefficients:
  mask_loss_coef: 1
  dice_loss_coef: 1
  bbox_loss_coef: 5
  giou_loss_coef: 2
  eos_coef: 0.1

  # dataset_parameters:
  dataset_file: coco
  coco_path: NULL
  coco_panoptic_path: NULL
  remove_difficult: True

  output_dir: NULL
  device: cuda
  seed: 42
  resume: ''
  start_epoch: 0
  eval: False
  num_workers: 2

  # distributed_training:
  world_size: 1
  dist_url: env://


  # detect test
detect:
  detecttest: True
  image_dir: //put your image dir here//  # meaningful if detect_test is true